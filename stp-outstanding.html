    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            padding: 25px 40px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .metrics-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px 40px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .metric-card {
            background: white;
            padding: 25px 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #667eea;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .metric-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .metric-card.commercial {
            border-left-color: #667eea;
        }

        .metric-card.gia2h {
            border-left-color: #f093fb;
        }

        .metric-card.blackjack {
            border-left-color: #4facfe;
        }

        .metric-number {
            font-size: 3em;
            font-weight: 800;
            color: #2c3e50;
            margin-bottom: 8px;
            line-height: 1;
        }

        .metric-label {
            font-size: 0.9em;
            color: #6c757d;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .dashboard {
            padding: 20px;
            overflow-x: auto;
        }

        .migration-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            background: white;
        }

        .migration-table thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .migration-table th {
            padding: 14px 10px;
            text-align: center;
            font-weight: 700;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.8em;
            line-height: 1.4;
            min-width: 80px;
        }

        .migration-table th.team-col {
            text-align: left;
            position: sticky;
            left: 0;
            z-index: 20;
            background: #2c3e50;
            min-width: 220px;
            max-width: 220px;
        }

        .migration-table th.env-header {
            font-size: 0.95em;
            padding: 16px 10px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 800;
        }

        .migration-table th.commercial-header {
            background: #667eea;
        }

        .migration-table th.gia2h-header {
            background: #f093fb;
        }

        .migration-table th.blackjack-header {
            background: #4facfe;
        }

        .migration-table th.commercial-milestone {
            background: #5a6fd8;
        }

        .migration-table th.gia2h-milestone {
            background: #e081f0;
        }

        .migration-table th.blackjack-milestone {
            background: #3d9cec;
        }

        .migration-table tbody tr {
            transition: background-color 0.2s;
        }

        .migration-table tbody tr:nth-child(even) {
            background: #f8f9fa;
        }

        .migration-table tbody tr:hover {
            background: #e7f1ff;
        }

        .migration-table td {
            padding: 14px 10px;
            text-align: center;
            border: 1px solid #dee2e6;
            vertical-align: middle;
            font-size: 0.95em;
        }

        .migration-table td.team-name {
            font-weight: 600;
            text-align: left;
            position: sticky;
            left: 0;
            background: inherit;
            z-index: 5;
            border-right: 2px solid #dee2e6;
            font-size: 0.9em;
        }

        .migration-table tbody tr:nth-child(even) td.team-name {
            background: #f8f9fa;
        }

        .migration-table tbody tr:hover td.team-name {
            background: #e7f1ff;
        }

        .cell-complete {
            background: #28a745;
            color: white;
            font-weight: 700;
            font-size: 1.3em;
        }

        .cell-remaining {
            background: white;
            color: #667eea;
            font-weight: 600;
        }

        .cell-na {
            background: #e9ecef;
            color: #adb5bd;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .no-results h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .legend {
            display: flex;
            gap: 30px;
            padding: 20px 40px;
            background: #f8f9fa;
            border-top: 2px solid #e9ecef;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95em;
        }

        .legend-box {
            width: 40px;
            height: 25px;
            border-radius: 4px;
            border: 1px solid #dee2e6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .legend-box.complete {
            background: #28a745;
            color: white;
        }

        .legend-box.remaining {
            background: white;
            color: #667eea;
            border: 1px solid #667eea;
        }

        .legend-box.na {
            background: #e9ecef;
            color: #adb5bd;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .dashboard {
                padding: 10px;
            }

            .migration-table {
                font-size: 0.8em;
            }

            .migration-table th.team-col {
                min-width: 180px;
            }
        }
    </style>
</head>

        let filteredTeams = [...teams];

        function getCellClass(status) {
            if (status === 'complete') return 'cell-complete';
            if (status === 'na') return 'cell-na';
            return 'cell-remaining';
        }

        function getCellContent(milestone) {
            if (milestone.status === 'complete') {
                return '✓';
            } else if (milestone.status === 'na') {
                return '-';
            } else {
                // Remaining - show release or TBD
                return milestone.release ? `R${milestone.release}` : 'TBD';
            }
        }

        function calculateMetrics() {
            const metrics = {
                totalTeams: teams.length,
                commercialOutstanding: 0,
                gia2hOutstanding: 0,
                blackjackOutstanding: 0
            };

            teams.forEach(team => {
                // Check if team has remaining work in each environment
                const hasCommercialWork = team.commercial.some(m => m.status === 'remaining');
                const hasGia2hWork = team.gia2h.some(m => m.status === 'remaining');
                const hasBlackjackWork = team.blackjack.some(m => m.status === 'remaining');

                if (hasCommercialWork) metrics.commercialOutstanding++;
                if (hasGia2hWork) metrics.gia2hOutstanding++;
                if (hasBlackjackWork) metrics.blackjackOutstanding++;
            });

            return metrics;
        }

        function renderMetrics() {
            const metrics = calculateMetrics();
            const metricsContainer = document.createElement('div');
            metricsContainer.className = 'metrics-section';
            metricsContainer.innerHTML = `
                <div class="metric-card">
                    <div class="metric-number">${metrics.totalTeams}</div>
                    <div class="metric-label">Total Teams</div>
                </div>
                <div class="metric-card commercial">
                    <div class="metric-number">${metrics.commercialOutstanding}</div>
                    <div class="metric-label">Commercial Work Outstanding</div>
                </div>
                <div class="metric-card gia2h">
                    <div class="metric-number">${metrics.gia2hOutstanding}</div>
                    <div class="metric-label">Gia2h Work Outstanding</div>
                </div>
                <div class="metric-card blackjack">
                    <div class="metric-number">${metrics.blackjackOutstanding}</div>
                    <div class="metric-label">Blackjack-A Work Outstanding</div>
                </div>
            `;
            
            // Insert before dashboard
            const dashboard = document.getElementById('dashboard');
            dashboard.parentNode.insertBefore(metricsContainer, dashboard);
        }

        function renderTableHeader() {
            return `
                <thead>
                    <tr>
                        <th class="team-col" rowspan="2">Team</th>
                        <th class="env-header commercial-header" colspan="7">Commercial</th>
                        <th class="env-header gia2h-header" colspan="4">Gia2h</th>
                        <th class="env-header blackjack-header" colspan="3">Blackjack-A</th>
                    </tr>
                    <tr>
                        <th class="commercial-milestone">1.0<br>Dev POC</th>
                        <th class="commercial-milestone">1.1<br>Dev FKP</th>
                        <th class="commercial-milestone">1.2<br>Pre-Prod</th>
                        <th class="commercial-milestone">1.3<br>Prod Conv</th>
                        <th class="commercial-milestone">1.4<br>Mesh+IG</th>
                        <th class="commercial-milestone">1.5<br>Traffic</th>
                        <th class="commercial-milestone">1.6<br>Decommission</th>
                        <th class="gia2h-milestone">2.1<br>Dev</th>
                        <th class="gia2h-milestone">2.2<br>Pre-Prod</th>
                        <th class="gia2h-milestone">2.3<br>Prod</th>
                        <th class="gia2h-milestone">2.4<br>Decommission</th>
                        <th class="blackjack-milestone">3.1<br>Dev</th>
                        <th class="blackjack-milestone">3.2<br>Stage</th>
                        <th class="blackjack-milestone">3.3<br>Prod</th>
                    </tr>
                </thead>
            `;
        }

        function renderTableRow(team) {
            const allMilestones = [
                ...team.commercial,
                ...team.gia2h,
                ...team.blackjack
            ];

            const cells = allMilestones.map(m => `
                <td class="${getCellClass(m.status)}">
                    ${getCellContent(m)}
                </td>
            `).join('');

            return `
                <tr>
                    <td class="team-name">${team.name}</td>
                    ${cells}
                </tr>
            `;
        }

        function renderDashboard() {
            const dashboard = document.getElementById('dashboard');

            if (filteredTeams.length === 0) {
                dashboard.innerHTML = `
                    <div class="no-results">
                        <h3>No teams found</h3>
                        <p>Try adjusting your search</p>
                    </div>
                `;
                return;
            }

            dashboard.innerHTML = `
                <table class="migration-table">
                    ${renderTableHeader()}
                    <tbody>
                        ${filteredTeams.map(team => renderTableRow(team)).join('')}
                    </tbody>
                </table>
            `;
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            filteredTeams = teams.filter(team => {
                if (searchTerm && !team.name.toLowerCase().includes(searchTerm)) {
                    return false;
                }
                return true;
            });

            renderDashboard();
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', applyFilters);

        // Initial render
        renderMetrics();
        renderDashboard();
    </script>
